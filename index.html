<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理醫生的一天 — 生死課</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121e;--bg3:#1a1a2e;
  --text:#c9d1d9;--text-bright:#f0f6fc;--text-dim:#6b7280;
  --amber:#f59e0b;--amber-dim:#92400e;--amber-bg:rgba(245,158,11,.08);
  --cyan:#22d3ee;--cyan-dim:#0e7490;
  --red:#f87171;--green:#34d399;--pink:#f472b6;
  --note-bg:rgba(245,158,11,.12);--note-border:#b45309;
  --choice-bg:#16162a;--choice-border:#2a2a4a;--choice-hover:#222244;
}
html{font-size:16px;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;
  color:var(--text);background:var(--bg);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  line-height:1.8;overflow-x:hidden;
}
#app{
  flex:1;display:flex;flex-direction:column;
  max-width:680px;width:100%;margin:0 auto;
  padding:1rem 1.2rem 6rem;position:relative;
}
.braille-art{
  font-family:'Courier New',monospace;
  color:var(--cyan);text-align:center;
  line-height:1.1;font-size:14px;
  white-space:pre;margin:1.5rem 0;
  opacity:0;animation:fadeIn .8s ease forwards;
  text-shadow:0 0 20px rgba(34,211,238,.2);
  user-select:none;
}
#content{min-height:40vh}
.scene-line{
  opacity:0;transform:translateY(8px);
  transition:opacity .5s ease,transform .5s ease;
  margin-bottom:.6rem;padding:.4rem 0;
}
.scene-line.visible{opacity:1;transform:translateY(0)}
.scene-line.narration{color:var(--text-dim);font-style:italic;font-size:.92rem}
.scene-line.system{color:var(--text-dim);text-align:center;font-size:.85rem;letter-spacing:.08em}
.scene-line.dialogue .speaker{color:var(--amber);font-weight:600;font-size:.85rem;display:block;margin-bottom:.15rem}
.scene-line.dialogue .text{color:var(--text-bright)}
.scene-line.quote{
  border-left:3px solid var(--amber-dim);padding:.8rem 1rem;margin:.8rem 0;
  background:var(--amber-bg);border-radius:0 8px 8px 0;color:var(--text);font-size:.95rem;
}
.scene-line.file-info{
  background:var(--bg2);border:1px solid var(--choice-border);
  border-radius:8px;padding:1rem 1.2rem;margin:.5rem 0;font-size:.9rem;
}
.scene-line.file-info .label{color:var(--text-dim);font-size:.8rem}
.scene-line.file-info .value{color:var(--text-bright)}
.scene-line.notable{
  cursor:pointer;position:relative;
  padding:.5rem .8rem .5rem 1rem;
  border-left:3px solid transparent;border-radius:0 6px 6px 0;
  transition:all .3s ease;
}
.scene-line.notable:not(.observation)::before{
  content:'';position:absolute;left:-20px;top:50%;
  transform:translateY(-50%);width:14px;height:14px;
  border:1.5px solid var(--text-dim);border-radius:3px;
  transition:all .3s ease;opacity:.4;
}
.scene-line.notable:hover{background:rgba(245,158,11,.05);border-left-color:var(--amber-dim)}
.scene-line.notable:not(.observation):hover::before{opacity:.8;border-color:var(--amber)}
.scene-line.noted:not(.observation){background:var(--note-bg);border-left-color:var(--amber)}
.scene-line.noted:not(.observation)::before{background:var(--amber);border-color:var(--amber);opacity:1}
.scene-line.noted:not(.observation)::after{
  content:'✓';position:absolute;left:-19px;top:50%;
  transform:translateY(-50%);color:var(--bg);font-size:10px;font-weight:700;
}
.scene-line.observation{
  color:var(--cyan-dim);font-size:.84rem;font-style:italic;
  padding:.4rem .8rem;margin:.3rem 0;
  border-left:2px solid rgba(14,116,144,.3);
  background:rgba(34,211,238,.04);border-radius:0 6px 6px 0;
}
.scene-line.observation::before{content:'🔍 ';font-style:normal;font-size:.75rem}
.scene-line.observation.notable{cursor:pointer;border-left:2px solid rgba(14,116,144,.3)}
.scene-line.observation.notable:hover{background:rgba(34,211,238,.08);border-left-color:var(--cyan)}
.scene-line.observation.noted{background:rgba(34,211,238,.1);border-left-color:var(--cyan)}
.note-stat{
  font-size:.72rem;color:var(--text-dim);margin-top:.15rem;padding-left:1rem;
  opacity:0;transform:translateY(-4px);
  transition:opacity .4s ease,transform .4s ease;
}
.note-stat.show{opacity:1;transform:translateY(0)}
.note-hint{color:var(--text-dim);font-size:.75rem;text-align:center;margin:.5rem 0 1rem;opacity:0;animation:fadeIn .5s ease .5s forwards}
#choices{margin-top:1.5rem}
.choice-btn{
  display:block;width:100%;text-align:left;
  background:var(--choice-bg);color:var(--text-bright);
  border:1px solid var(--choice-border);border-radius:10px;
  padding:.9rem 1.2rem;margin-bottom:.7rem;
  font-size:.95rem;line-height:1.6;
  cursor:pointer;transition:all .25s ease;font-family:inherit;
}
.choice-btn:hover{background:var(--choice-hover);border-color:var(--amber-dim);transform:translateX(4px)}
.choice-btn:active{transform:translateX(2px);opacity:.8}
.choice-btn .choice-label{color:var(--amber);font-weight:600;margin-right:.5rem}
#notebook-toggle{
  position:fixed;top:1rem;right:1rem;z-index:100;
  background:var(--bg2);border:1px solid var(--choice-border);
  border-radius:50%;width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s ease;font-size:1.2rem;color:var(--amber);
}
#notebook-toggle:hover{border-color:var(--amber);background:var(--bg3)}
#notebook-toggle .count{
  position:absolute;top:-4px;right:-4px;
  background:var(--amber);color:var(--bg);
  font-size:.7rem;font-weight:700;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0);transition:all .3s ease;
}
#notebook-toggle .count.show{opacity:1;transform:scale(1)}
#notebook-panel{
  position:fixed;top:0;right:-100%;width:min(360px,85vw);height:100%;
  background:var(--bg2);border-left:1px solid var(--choice-border);
  z-index:200;transition:right .35s ease;display:flex;flex-direction:column;overflow:hidden;
}
#notebook-panel.open{right:0}
#notebook-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:199;opacity:0;pointer-events:none;transition:opacity .35s ease;
}
#notebook-overlay.show{opacity:1;pointer-events:auto}
.nb-header{padding:1.2rem;border-bottom:1px solid var(--choice-border);display:flex;align-items:center;justify-content:space-between}
.nb-header h3{color:var(--amber);font-size:1rem;font-weight:600}
.nb-close{background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;padding:.2rem .5rem}
.nb-close:hover{color:var(--text)}
.nb-body{flex:1;overflow-y:auto;padding:1rem}
.nb-empty{color:var(--text-dim);text-align:center;padding:2rem 1rem;font-size:.9rem}
.nb-item{
  padding:.6rem .8rem;margin-bottom:.5rem;
  background:var(--amber-bg);border-left:3px solid var(--amber);
  border-radius:0 6px 6px 0;font-size:.88rem;
  color:var(--text-bright);line-height:1.6;animation:slideInRight .3s ease;
}
#hotline{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--choice-border);
  padding:.5rem 1rem;text-align:center;font-size:.75rem;color:var(--text-dim);z-index:50;
}
#hotline a{color:var(--amber);text-decoration:none;margin:0 .4rem}
#hotline a:hover{text-decoration:underline}
.review-section{margin:1.5rem 0}
.review-section h3{color:var(--amber);font-size:1rem;margin-bottom:.8rem}
.stat-bar{display:flex;align-items:center;margin-bottom:.8rem;gap:.8rem}
.stat-bar .label{flex:0 0 auto;font-size:.85rem;color:var(--text);min-width:180px}
.stat-bar .bar{flex:1;height:24px;background:var(--bg3);border-radius:12px;overflow:hidden}
.stat-bar .bar-fill{height:100%;border-radius:12px;transition:width 1.5s ease;width:0}
.stat-bar .bar-fill.amber{background:linear-gradient(90deg,var(--amber-dim),var(--amber))}
.stat-bar .bar-fill.cyan{background:linear-gradient(90deg,var(--cyan-dim),var(--cyan))}
.stat-bar .bar-fill.green{background:linear-gradient(90deg,#065f46,var(--green))}
.stat-bar .bar-fill.pink{background:linear-gradient(90deg,#9d174d,var(--pink))}
.stat-bar .pct{font-size:.8rem;color:var(--text-dim);min-width:40px;text-align:right}
.insight-card{background:var(--bg3);border:1px solid var(--choice-border);border-radius:10px;padding:1.2rem;margin:.8rem 0}
.insight-card .insight-title{color:var(--cyan);font-size:.85rem;margin-bottom:.5rem}
.insight-card .insight-body{color:var(--text-bright);font-size:.92rem;line-height:1.8}
.final-message{text-align:center;margin:2rem 0;padding:1.5rem;border:1px solid var(--amber-dim);border-radius:12px;background:var(--amber-bg)}
.final-message p{color:var(--text-bright);font-size:1rem;line-height:2}
.restart-btn{
  display:block;margin:2rem auto;background:none;border:1px solid var(--choice-border);
  color:var(--text-dim);padding:.7rem 2rem;border-radius:8px;
  cursor:pointer;font-size:.9rem;font-family:inherit;transition:all .3s ease;
}
.restart-btn:hover{border-color:var(--amber);color:var(--amber)}
.title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center}
.title-screen h1{font-size:clamp(1.8rem,5vw,2.6rem);color:var(--text-bright);font-weight:700;margin:.5rem 0;letter-spacing:.05em}
.title-screen .subtitle{color:var(--text-dim);font-size:clamp(.85rem,2.5vw,1rem);margin-bottom:2rem}
.start-btn{
  background:none;border:2px solid var(--amber);color:var(--amber);
  padding:.8rem 3rem;border-radius:8px;font-size:1.1rem;cursor:pointer;
  font-family:inherit;transition:all .3s ease;letter-spacing:.1em;
}
.start-btn:hover{background:var(--amber);color:var(--bg)}
.disclaimer{margin-top:2.5rem;padding:1rem;border:1px solid var(--choice-border);border-radius:8px;font-size:.78rem;color:var(--text-dim);line-height:1.8;max-width:400px}
.input-area{margin:1rem 0}
.input-area textarea{
  width:100%;background:var(--bg2);border:1px solid var(--choice-border);
  color:var(--text-bright);border-radius:8px;padding:.8rem;
  font-family:inherit;font-size:.9rem;resize:vertical;min-height:80px;line-height:1.6;
}
.input-area textarea:focus{outline:none;border-color:var(--amber-dim)}
.input-area .submit-btn{
  margin-top:.5rem;background:var(--amber);color:var(--bg);
  border:none;padding:.6rem 1.5rem;border-radius:6px;
  cursor:pointer;font-family:inherit;font-size:.9rem;transition:opacity .2s;
}
.input-area .submit-btn:hover{opacity:.85}
.ep-divider{text-align:center;margin:2rem 0;padding:2rem 0}
.ep-divider .ep-num{color:var(--text-dim);font-size:.8rem;letter-spacing:.3em;text-transform:uppercase}
.ep-divider .ep-name{color:var(--text-bright);font-size:1.3rem;margin:.3rem 0;font-weight:600}
.ep-divider .ep-desc{color:var(--text-dim);font-size:.85rem}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes notePop{0%{transform:scale(1)}30%{transform:scale(1.06);box-shadow:0 0 16px rgba(245,158,11,.35)}60%{transform:scale(.98)}100%{transform:scale(1)}}
.animate-pop{animation:notePop .5s ease}
/* first-note tutorial toast */
.note-toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--bg3);border:1px solid var(--amber-dim);border-radius:10px;
  padding:.8rem 1.2rem;font-size:.82rem;color:var(--amber);z-index:250;
  opacity:0;transition:all .5s ease;pointer-events:none;text-align:center;
  max-width:320px;box-shadow:0 4px 24px rgba(0,0,0,.4);
}
.note-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* case report */
.case-report{background:var(--bg2);border:1px solid var(--choice-border);border-radius:10px;padding:1.2rem;margin:.8rem 0}
.case-report h4{color:var(--amber);font-size:.85rem;margin-bottom:.4rem;letter-spacing:.05em}
.case-report .field-label{color:var(--cyan);font-size:.75rem;letter-spacing:.08em;margin-top:.8rem;margin-bottom:.2rem}
.case-report .field-content{color:var(--text);font-size:.85rem;line-height:1.7}
.case-report .risk-badge{display:inline-block;padding:.15rem .6rem;border-radius:4px;font-size:.75rem;font-weight:600}
.case-report .risk-moderate{background:rgba(245,158,11,.15);color:var(--amber)}
.case-report .risk-high{background:rgba(248,113,113,.15);color:var(--red)}
/* self-reflection choices */
.reflect-btn{
  display:block;width:100%;text-align:left;
  background:var(--bg3);color:var(--text);
  border:1px solid var(--choice-border);border-radius:8px;
  padding:.8rem 1rem;margin-bottom:.6rem;font-size:.85rem;line-height:1.6;
  cursor:pointer;transition:all .25s ease;font-family:inherit;
}
.reflect-btn:hover{border-color:var(--cyan);color:var(--text-bright)}
.reflect-btn.selected{border-color:var(--cyan);background:rgba(34,211,238,.08);color:var(--text-bright)}
.reflect-feedback{
  background:var(--bg3);border-left:3px solid var(--cyan);border-radius:0 8px 8px 0;
  padding:.8rem 1rem;margin:.8rem 0;font-size:.84rem;color:var(--text);line-height:1.7;
  opacity:0;transform:translateY(8px);transition:all .5s ease;
}
.reflect-feedback.show{opacity:1;transform:translateY(0)}
/* choice stats */
.choice-stat{display:flex;align-items:center;margin-bottom:.5rem;gap:.6rem;font-size:.82rem}
.choice-stat .cs-label{flex:1;color:var(--text)}
.choice-stat .cs-bar{width:120px;height:16px;background:var(--bg3);border-radius:8px;overflow:hidden}
.choice-stat .cs-fill{height:100%;border-radius:8px;transition:width 1.2s ease;width:0}
.choice-stat .cs-pct{min-width:35px;text-align:right;color:var(--text-dim);font-size:.78rem}
@media(max-width:480px){
  #app{padding:.8rem .8rem 5rem}
  .scene-line.notable{padding-left:.6rem}
  .scene-line.notable:not(.observation)::before{left:-16px;width:12px;height:12px}
  .scene-line.noted:not(.observation)::after{left:-15px;font-size:9px}
  .stat-bar{flex-wrap:wrap;gap:.3rem}
  .stat-bar .label{min-width:100%;font-size:.8rem}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--choice-border);border-radius:3px}
/* silence choice */
.choice-btn.silence{border-style:dashed;color:var(--text-dim);font-style:italic;text-align:center}
.choice-btn.silence:hover{color:var(--text-bright);border-color:var(--text-dim)}
/* notebook-powered choice */
.choice-btn.notebook-ref{border-color:var(--cyan-dim);border-width:2px;position:relative}
.choice-btn.notebook-ref .choice-label{color:var(--cyan)}
.choice-btn.notebook-ref:hover{border-color:var(--cyan);background:rgba(34,211,238,.06)}
.choice-btn.notebook-ref::after{content:'筆記';position:absolute;top:-.5rem;right:.6rem;font-size:.65rem;color:var(--cyan);background:var(--bg);padding:0 .4rem}
/* character card */
.char-card{
  display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;
  border-radius:12px;margin:1rem 0;border:1px solid;
  opacity:0;animation:fadeIn .8s ease forwards;
}
.char-card.ep1{background:rgba(100,116,139,.06);border-color:rgba(100,116,139,.15)}
.char-card.ep2{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.15)}
.char-avatar{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;font-weight:700;color:var(--text-bright);
  flex-shrink:0;letter-spacing:.1em;
}
.char-card.ep1 .char-avatar{background:rgba(100,116,139,.18);border:2px solid rgba(100,116,139,.3)}
.char-card.ep2 .char-avatar{background:rgba(245,158,11,.15);border:2px solid rgba(245,158,11,.25)}
.char-info .char-name{font-weight:600;color:var(--text-bright);font-size:.95rem}
.char-info .char-sub{font-size:.78rem;color:var(--text-dim);margin-top:.15rem}
.char-info .char-traits{font-size:.8rem;color:var(--text-dim);margin-top:.3rem;line-height:1.5}
.char-traits span{display:inline-block;background:var(--bg3);padding:.1rem .5rem;border-radius:4px;margin:.15rem .3rem .15rem 0;font-size:.72rem}
/* scene mood ambient */
#app{transition:box-shadow 1.5s ease}
#app[data-mood="cold"]{box-shadow:inset 0 120px 120px -90px rgba(100,116,139,.07)}
#app[data-mood="warm"]{box-shadow:inset 0 120px 120px -90px rgba(245,158,11,.05)}
#app[data-mood="tense"]{box-shadow:inset 0 120px 120px -90px rgba(248,113,113,.06)}
#app[data-mood="quiet"]{box-shadow:inset 0 120px 120px -90px rgba(34,211,238,.04)}
#app[data-mood="end"]{box-shadow:inset 0 120px 120px -90px rgba(245,158,11,.08)}
/* notebook unlock hint */
.unlock-hint{
  text-align:center;font-size:.78rem;color:var(--cyan);
  margin:.4rem 0;opacity:0;animation:fadeIn .6s ease .3s forwards;
}
/* replay buttons */
.replay-btns{display:flex;gap:.8rem;flex-wrap:wrap;margin:1rem 0}
.replay-btn{
  flex:1;min-width:140px;background:var(--bg3);border:1px solid var(--choice-border);
  color:var(--text);padding:.7rem;border-radius:8px;cursor:pointer;
  font-family:inherit;font-size:.85rem;text-align:center;transition:all .2s;
}
.replay-btn:hover{border-color:var(--amber);color:var(--amber)}
.explore-stat{font-size:.82rem;color:var(--text-dim);line-height:1.8;margin:.5rem 0}
.explore-stat .found{color:var(--green)}
.explore-stat .missed{color:var(--text-dim);opacity:.6}
/* export modal */
#export-modal{
  display:none;position:fixed;inset:0;z-index:300;
  align-items:center;justify-content:center;background:rgba(0,0,0,.85);
  flex-direction:column;overflow-y:auto;padding:1rem;
}
#export-modal.open{display:flex}
.export-container{
  background:var(--bg2);border:1px solid var(--choice-border);border-radius:12px;
  max-width:420px;width:100%;padding:1rem;display:flex;flex-direction:column;gap:.8rem;
  max-height:90vh;overflow-y:auto;
}
.export-header{display:flex;justify-content:space-between;align-items:center}
.export-header h3{color:var(--amber);font-size:1rem}
.export-header button{background:none;border:none;color:var(--text-dim);font-size:1.4rem;cursor:pointer}
#export-canvas{
  width:100%;border-radius:8px;cursor:crosshair;
  touch-action:none;border:1px solid var(--choice-border);
}
.draw-tools{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.color-picker{display:flex;gap:.4rem;align-items:center}
.color-btn{
  width:28px;height:28px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:border-color .2s;
}
.color-btn.active{border-color:var(--text-bright)}
.color-btn.eraser{background:var(--bg3)!important;font-size:12px;color:var(--text-dim);display:flex;align-items:center;justify-content:center}
.draw-actions{display:flex;gap:.5rem}
.draw-actions button{
  background:var(--bg3);border:1px solid var(--choice-border);color:var(--text);
  padding:.4rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:inherit;
}
.draw-actions .save-btn{background:var(--amber);color:var(--bg);border-color:var(--amber);font-weight:600}
.export-ep-btns{display:flex;gap:.5rem;flex-wrap:wrap;margin:.5rem 0}
.export-ep-btn{
  flex:1;min-width:140px;background:var(--bg3);border:1px solid var(--choice-border);
  color:var(--text);padding:.6rem;border-radius:8px;cursor:pointer;
  font-family:inherit;font-size:.85rem;text-align:center;transition:all .2s;
}
.export-ep-btn:hover{border-color:var(--amber);color:var(--amber)}
</style>
</head>
<body>
<div id="app"><div id="content"></div><div id="choices"></div></div>
<div id="notebook-toggle" onclick="toggleNotebook()" style="display:none">
  <span>📋</span><span class="count" id="nb-count">0</span>
</div>
<div id="notebook-overlay" onclick="toggleNotebook()"></div>
<div id="notebook-panel">
  <div class="nb-header"><h3>📋 諮商筆記</h3><button class="nb-close" onclick="toggleNotebook()">&times;</button></div>
  <div class="nb-body" id="nb-body"><div class="nb-empty">還沒有記錄任何筆記。<br>點擊對話中你覺得重要的句子來記錄。</div></div>
</div>
<div id="export-modal">
  <div class="export-container">
    <div class="export-header">
      <h3>📋 筆記卡片</h3>
      <button onclick="closeExport()">&times;</button>
    </div>
    <canvas id="export-canvas"></canvas>
    <div class="draw-tools">

function addNote(text, speaker, isObservation) {
  if (state.notebook.some(n => n.text === text)) return false;
  state.notebook.push({ text, speaker, scene: state.currentScene, observation: !!isObservation });
  updateNotebookCount();
  return true;
}
function updateNotebookCount() {
  const c = document.getElementById('nb-count');
  c.textContent = state.notebook.length;
  c.classList.toggle('show', state.notebook.length > 0);
  renderNotebookBody();
}
function renderNotebookBody() {
  const body = document.getElementById('nb-body');
  if (state.notebook.length === 0) {
    body.innerHTML = '<div class="nb-empty">還沒有記錄任何筆記。<br>點擊對話中你覺得重要的句子來記錄。</div>';
  } else {

        : `<div class="nb-item"><span style="color:var(--amber)">${n.speaker?n.speaker+'：':''}</span>${n.text}</div>`
    ).join('');

  }
}
function toggleNotebook() {

// ============================================================
const contentEl = document.getElementById('content');
const choicesEl = document.getElementById('choices');

function goScene(id) {
  state.currentScene = id;
  state.path.push(id);
  if (!state.startTime) state.startTime = Date.now();
  // Completion tracking
  if (id === 'ep1_final' && !state.completed.includes('ep1')) state.completed.push('ep1');
  if (id === 'ep2_final' && !state.completed.includes('ep2')) state.completed.push('ep2');
  // Show notebook after first patient encounter
  if (state.path.includes('meet') || state.path.includes('ep2_meet')) document.getElementById('notebook-toggle').style.display = 'flex';
  const scene = SCENES[id];
  if (!scene) { console.error('Scene not found:', id); return; }
  // Scene mood
  const app = document.getElementById('app');
  app.dataset.mood = scene.mood || '';
  contentEl.style.opacity = '0';
  choicesEl.style.opacity = '0';
  setTimeout(() => {
    contentEl.innerHTML = '';
    choicesEl.innerHTML = '';
    if (scene.render) { scene.render(contentEl); contentEl.style.opacity = '1'; return; }
    if (scene.art) {
      const a = document.createElement('pre');
      a.className = 'braille-art'; a.textContent = scene.art;
      contentEl.appendChild(a);
    }
    // Character card
    if (scene.charCard) {
      const cc = scene.charCard;
      const card = document.createElement('div');
      card.className = `char-card ${cc.ep}`;
      card.innerHTML = `
        <div class="char-avatar">${cc.name[0]}</div>
        <div class="char-info">
          <div class="char-name">${cc.name}</div>
          <div class="char-sub">${cc.sub}</div>
          <div class="char-traits">${cc.traits.map(t => `<span>${t}</span>`).join('')}</div>
        </div>`;
      contentEl.appendChild(card);
    }
    const lines = scene.lines || [];
    const els = [];
    lines.forEach((line, i) => {
      const el = createLineElement(line);
      contentEl.appendChild(el); els.push(el);
    });
    if (scene.noteHint && lines.some(l => l.notable)) {
      const h = document.createElement('div');
      h.className = 'note-hint';
      h.textContent = '💡 點擊你覺得重要的對話來記錄筆記';
      contentEl.appendChild(h);
    }
    contentEl.style.opacity = '1';
    els.forEach((el, i) => { setTimeout(() => el.classList.add('visible'), 200 + i * 350); });
    if (scene.choices) {
      setTimeout(() => { renderChoices(scene.choices); choicesEl.style.opacity = '1'; }, 200 + lines.length * 350 + 400);
    }
    // Auto scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 300);
}

function hasNoteAbout(keywords) {

function getNoteStat(text) {
  const key = Object.keys(NOTE_STATS).find(k => text.startsWith(k));
  return key ? NOTE_STATS[key] : (30 + Math.floor(text.length * 1.7) % 40);
}

function createLineElement(line) {
  const el = document.createElement('div');
  el.className = `scene-line ${line.type}`;
  if (line.notable) el.classList.add('notable');
  if (line.type === 'dialogue') {
    el.innerHTML = `<span class="speaker">${line.speaker}</span><span class="text">${line.text}</span>`;
  } else if (line.type === 'observation') {
    el.textContent = line.text;
  } else if (line.html) {
    el.innerHTML = line.html;
  } else {
    el.textContent = line.text;
  }
  if (line.notable) {
    el.addEventListener('click', () => {
      if (el.classList.contains('noted')) return;
      if (addNote(line.text, line.speaker || null, line.type === 'observation')) {
        el.classList.add('noted', 'animate-pop');
        setTimeout(() => el.classList.remove('animate-pop'), 500);
        // Show note stat
        const pct = getNoteStat(line.text);
        const stat = document.createElement('div');
        stat.className = 'note-stat';
        stat.textContent = `${pct}% 的玩家也記下了這句`;
        el.appendChild(stat);
        setTimeout(() => stat.classList.add('show'), 50);
        // First note toast — explain that notes unlock choices
        if (state.notebook.length === 1 && !state._firstNoteToastShown) {
          state._firstNoteToastShown = true;
          const toast = document.createElement('div');
          toast.className = 'note-toast';
          toast.innerHTML = '📋 筆記已記錄<br><span style="font-size:.75rem;color:var(--text)">記下的內容可能會在關鍵時刻解鎖新的回應方式</span>';
          document.body.appendChild(toast);
          setTimeout(() => toast.classList.add('show'), 100);
          setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 4000);
        }
      }
    });
  }
  return el;
}

function renderChoices(choices) {
  choicesEl.innerHTML = '';
  const filtered = choices.filter(c => !c.requireNote || hasNoteAbout(c.requireNote));
  const hasUnlocked = filtered.some(c => c.requireNote);
  if (hasUnlocked && !state._noteHintShown) {
    state._noteHintShown = true;
    const hint = document.createElement('div');
    hint.className = 'unlock-hint';
    hint.textContent = '💡 你記下的筆記解鎖了一個新選項';
    choicesEl.appendChild(hint);
  }
  filtered.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (choice.silence ? ' silence' : '') + (choice.requireNote ? ' notebook-ref' : '');
    btn.innerHTML = (choice.label ? `<span class="choice-label">${choice.label}.</span>` : '') + choice.text;
    btn.addEventListener('click', () => goScene(choice.next));
    btn.style.opacity = '0'; btn.style.transform = 'translateY(10px)';
    btn.style.transition = 'opacity .4s ease, transform .4s ease';
    choicesEl.appendChild(btn);
    setTimeout(() => { btn.style.opacity = '1'; btn.style.transform = 'translateY(0)'; }, 100 + i * 150);
  });
}

const exportModal = document.getElementById('export-modal');

let drawColor = '#ffffff';

function renderCard(episode) {
  const W = 800, H = 1120;
  exportCanvas.width = W; exportCanvas.height = H;
  const ctx = exportCtx;

  // background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // border
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, W - 20, H - 20);

  // title
  ctx.fillStyle = '#f59e0b';
  ctx.font = 'bold 28px "Noto Sans TC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('心理醫生的一天 — 諮商筆記', W / 2, 55);

  // episode label
  const epLabel = episode === 1 ? 'Episode 1：林宥成' : 'Episode 2：陳雅婷';
  ctx.fillStyle = '#94a3b8';
  ctx.font = '18px "Noto Sans TC", sans-serif';
  ctx.fillText(epLabel, W / 2, 90);

  // divider
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(40, 110); ctx.lineTo(W - 40, 110); ctx.stroke();

  // notes
  const notes = episode === 1
    ? state.notebook.filter(n => !n.scene.startsWith('ep2'))
    : state.notebook.filter(n => n.scene.startsWith('ep2'));

  ctx.textAlign = 'left';
  let y = 145;

  if (notes.length === 0) {
    ctx.fillStyle = '#64748b';
    ctx.font = '18px "Noto Sans TC", sans-serif';
    ctx.fillText('（沒有記下任何筆記。但你聽完了整場對話。）', 50, y);
  } else {
    notes.forEach(n => {
      if (y > H - 120) return;
      if (n.observation) {
        // observation note
        ctx.fillStyle = '#0e7490';
        ctx.font = 'bold 16px "Noto Sans TC", sans-serif';
        ctx.fillText('🔍', 50, y);
        y += 26;
      } else if (n.speaker) {
        ctx.fillStyle = '#f59e0b';
        ctx.font = 'bold 16px "Noto Sans TC", sans-serif';
        ctx.fillText(n.speaker + '：', 50, y);
        y += 26;
      }
      // text
      ctx.fillStyle = n.observation ? '#22d3ee' : '#e2e8f0';
      ctx.font = '17px "Noto Sans TC", sans-serif';
      const lines = wrapText(ctx, n.text, W - 110);
      lines.forEach(line => {
        if (y > H - 120) return;
        ctx.fillText(line, 55, y);
        y += 26;
      });
      y += 14; // gap between notes
    });
  }

  // bottom divider
  ctx.strokeStyle = '#334155';
  ctx.beginPath(); ctx.moveTo(40, H - 90); ctx.lineTo(W - 40, H - 90); ctx.stroke();

  // footer
  ctx.fillStyle = '#64748b';
  ctx.font = '14px "Noto Sans TC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('每個人都值得被好好聽完。——包括你自己。', W / 2, H - 60);
  ctx.fillStyle = '#475569';
  ctx.font = '12px "Noto Sans TC", sans-serif';
  ctx.fillText('心理醫生的一天 — 生死課  ·  安心專線 1925', W / 2, H - 35);

  // save snapshot for drawing reset
  cardSnapshot = ctx.getImageData(0, 0, W, H);
}

function wrapText(ctx, text, maxWidth) {
  const result = [];
  let line = '';
  for (let i = 0; i < text.length; i++) {
    const testLine = line + text[i];
    if (ctx.measureText(testLine).width > maxWidth && line) {
      result.push(line);
      line = text[i];
    } else {
      line = testLine;
    }
  }
  if (line) result.push(line);
  return result;
}

// Drawing system
function setupDrawing() {
  const getPos = (e) => {
    const rect = exportCanvas.getBoundingClientRect();
    const scaleX = exportCanvas.width / rect.width;
    const scaleY = exportCanvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  };

  const startDraw = (e) => {
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    exportCtx.beginPath();
    exportCtx.moveTo(pos.x, pos.y);
  };
  const draw = (e) => {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);
    exportCtx.lineWidth = drawColor === 'eraser' ? 20 : 3;
    exportCtx.lineCap = 'round';
    exportCtx.strokeStyle = drawColor === 'eraser' ? '#1a1a2e' : drawColor;
    exportCtx.globalCompositeOperation = drawColor === 'eraser' ? 'destination-out' : 'source-over';
    exportCtx.lineTo(pos.x, pos.y);
    exportCtx.stroke();
    exportCtx.globalCompositeOperation = 'source-over';
  };
  const endDraw = () => { isDrawing = false; };

  // Remove old listeners by replacing canvas (simple approach)
  exportCanvas.onmousedown = startDraw;
  exportCanvas.onmousemove = draw;
  exportCanvas.onmouseup = endDraw;
  exportCanvas.onmouseleave = endDraw;
  exportCanvas.ontouchstart = startDraw;
  exportCanvas.ontouchmove = draw;
  exportCanvas.ontouchend = endDraw;
}

function setDrawColor(btn, color) {
  drawColor = color;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function clearDrawing() {
  if (cardSnapshot) exportCtx.putImageData(cardSnapshot, 0, 0);
}

function saveCard() {
  const link = document.createElement('a');
  link.download = '心理醫生的一天_筆記卡片.png';
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
}

function buildExploreHTML() {
  let html = '';
  const ep1Found = EXPLORE_KEYS.ep1.filter(k => state.path.includes(k.id));
  const ep2Found = EXPLORE_KEYS.ep2.filter(k => state.path.includes(k.id));
  const ep1Total = EXPLORE_KEYS.ep1.length;
  const ep2Total = EXPLORE_KEYS.ep2.length;

  html += `<p style="margin-bottom:.6rem">林宥成：探索了 <strong style="color:var(--amber)">${ep1Found.length}</strong> / ${ep1Total} 條路線</p>`;
  html += EXPLORE_KEYS.ep1.map(k =>
    state.path.includes(k.id)
      ? `<span class="found">✓ ${k.label}</span><br>`
      : `<span class="missed">？ ${k.label.replace(/[^：📋（）]/g, '•').replace(/[：📋（）]/g, '')}</span><br>`
  ).join('');

  html += `<p style="margin:.8rem 0 .6rem">陳雅婷：探索了 <strong style="color:var(--amber)">${ep2Found.length}</strong> / ${ep2Total} 條路線</p>`;
  html += EXPLORE_KEYS.ep2.map(k =>
    state.path.includes(k.id)
      ? `<span class="found">✓ ${k.label}</span><br>`
      : `<span class="missed">？ ${k.label.replace(/[^：📋（）]/g, '•').replace(/[：📋（）]/g, '')}</span><br>`
  ).join('');

  // Notebook unlock summary
  const noteUnlocks = [
    state.path.includes('ep1_end_note'),
    state.path.includes('ep2_end_note')
  ];
  const unlocked = noteUnlocks.filter(Boolean).length;
  html += `<p style="margin-top:.8rem;color:var(--cyan)">📋 筆記特殊選項：${unlocked}/2 個已解鎖`;
  if (unlocked < 2) html += `<br><span style="font-size:.78rem;color:var(--text-dim)">提示：記下更多筆記，某些關鍵時刻會出現新的回應方式⋯⋯</span>`;
  html += '</p>';

  return html;
}

function replayEp(ep) {
  // Keep notebook but reset path and completion for that episode
  if (ep === 1) {
    state.path = state.path.filter(p => p.startsWith('ep2'));
    state.completed = state.completed.filter(c => c !== 'ep1');
  } else {
    state.path = state.path.filter(p => !p.startsWith('ep2') && p !== 'deflect1');
    state.completed = state.completed.filter(c => c !== 'ep2');
  }
  state._noteHintShown = false;
  document.getElementById('notebook-toggle').style.display = 'flex';
  goScene(ep === 1 ? 'file' : 'ep2_file');
}
